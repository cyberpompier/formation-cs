    <meta name="theme-color" content="#dc2626" />
    <meta name="description" content="Gestion des formations Sapeurs-Pompiers" />
    <title>FireTrained</title>
    <link rel="manifest" href="/public/manifest.json" />
    <link rel="apple-touch-icon" href="/public/icon-192.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              fire: {
                red: '#dc2626',
                dark: '#0f172a',
                navy: '#1e293b',
                light: '#f1f5f9'
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Safe area spacing for mobile PWA */
      body {
        padding-bottom: env(safe-area-inset-bottom);
        overscroll-behavior-y: none; /* Prevent pull-to-refresh */
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      /* Custom Animations */
      @keyframes fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes slide-in-bottom {
        from { transform: translateY(20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      @keyframes zoom-in {
        from { transform: scale(0.95); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
      .animate-slide-in-bottom { animation: slide-in-bottom 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .animate-zoom-in { animation: zoom-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

      /* Custom Scrollbar */
      .scrollbar-none::-webkit-scrollbar { display: none; }
      .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

      /* Glassmorphism utilities */
      .glass {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      /* Transitions */
      .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 300ms; }
    </style>
